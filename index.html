<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#14110c" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet" />
  <title>墨山海 INKWILD</title>
</head>
<body>
  <div id="game-container"></div>
  <!-- 開機畫面:字體/雲端載入期間的墨點呼吸,遊戲起來後由 main.ts 移除 -->
  <div id="boot-loader">
    <div id="boot-ink"></div>
    <div id="boot-text">墨 山 海</div>
  </div>
  <style>
    #boot-loader {
      position: fixed; inset: 0; background: #14110c;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; pointer-events: none;
    }
    #boot-ink {
      width: 26px; height: 26px; border-radius: 50%;
      background: #b03a2e; animation: inkpulse 1.4s ease-in-out infinite;
    }
    #boot-text {
      margin-top: 28px; color: #f3ead6; opacity: 0.65;
      font-family: serif; font-size: 22px; letter-spacing: 8px;
    }
    @keyframes inkpulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.7); opacity: 1; }
    }
  </style>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
